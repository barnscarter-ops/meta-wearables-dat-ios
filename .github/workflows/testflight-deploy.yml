name: TestFlight Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Pin HOME to the runner user's real home
        # The self-hosted runner's job steps launch with HOME="/", which makes `security`
        # and xcodebuild resolve ~ into the root-owned /Library (unwritable) and fail.
        # Resolve the real home from the directory service (independent of the broken
        # $HOME) and export it to every subsequent step via $GITHUB_ENV.
        run: |
          echo "HOME=$(dscl . -read /Users/"$(id -un)" NFSHomeDirectory | sed 's/.*: //')" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bundle install

      - name: Deploy to TestFlight
        run: bundle exec fastlane deploy
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
