name: CameraAccess iOS Simulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "samples/CameraAccess/**"
      - ".github/workflows/cameraaccess-ios-simulator.yml"
  push:
    paths:
      - "samples/CameraAccess/**"
      - ".github/workflows/cameraaccess-ios-simulator.yml"

jobs:
  build-and-test:
    name: Build and test CameraAccess
    runs-on: macos-26
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    env:
      PROJECT_PATH: samples/CameraAccess/CameraAccess.xcodeproj
      SCHEME: CameraAccess
      CONFIGURATION: Debug
      BUILD_LOG: CameraAccess-xcodebuild.log
      BUILD_RESULT_BUNDLE: CameraAccess-Build.xcresult
      UNIT_RESULT_BUNDLE: CameraAccess-UnitTests.xcresult
      UI_RESULT_BUNDLE: CameraAccess-UITests.xcresult
      DERIVED_DATA_DIR: CameraAccessDerivedData
      OPENAI_API_KEY: ""
      META_APP_ID: "0"
      CLIENT_TOKEN: ""
      DEVELOPMENT_TEAM_ID: V9WTTPBFK9

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode and simulator environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Select an available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(
            python3 - <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS"):
                  continue
              for device in devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      candidates.append(device)

          preferred_names = ("iPhone 17 Pro", "iPhone 17", "iPhone 16 Pro", "iPhone 16", "iPhone 15")
          for name in preferred_names:
              for device in candidates:
                  if device.get("name") == name:
                      print(device["udid"])
                      raise SystemExit

          if candidates:
              print(candidates[0]["udid"])
              raise SystemExit

          raise SystemExit("No available iPhone simulator found")
          PY
          )"
          echo "SIMULATOR_ID=${SIMULATOR_ID}" >> "$GITHUB_ENV"
          echo "id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "${SIMULATOR_ID}" || true
          xcrun simctl bootstatus "${SIMULATOR_ID}" -b

      - name: Resolve Swift package dependencies
        run: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Build CameraAccess for testing
        run: |
          set -euo pipefail
          rm -rf "$BUILD_RESULT_BUNDLE" "$BUILD_LOG"
          xcodebuild build-for-testing \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/$DERIVED_DATA_DIR" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            -resultBundlePath "$BUILD_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_ID" \
            META_APP_ID="$META_APP_ID" \
            CLIENT_TOKEN="$CLIENT_TOKEN" \
            | tee "$BUILD_LOG"

      - name: Run CameraAccess unit integration tests
        env:
          CAMERAACCESS_SKIP_APP_STARTUP: "1"
        run: |
          set -euo pipefail
          rm -rf "$UNIT_RESULT_BUNDLE"
          xcodebuild test-without-building \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/$DERIVED_DATA_DIR" \
            -parallel-testing-enabled NO \
            -only-testing:CameraAccessTests \
            -resultBundlePath "$UNIT_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_ID" \
            META_APP_ID="$META_APP_ID" \
            CLIENT_TOKEN="$CLIENT_TOKEN" \
            | tee -a "$BUILD_LOG"

      - name: Run CameraAccess UI smoke test
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf "$UI_RESULT_BUNDLE"
          xcodebuild test-without-building \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/$DERIVED_DATA_DIR" \
            -only-testing:CameraAccessUITests/CameraAccessUITests/testPhotoCaptureAndDismiss \
            -resultBundlePath "$UI_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_ID" \
            META_APP_ID="$META_APP_ID" \
            CLIENT_TOKEN="$CLIENT_TOKEN" \
            | tee -a "$BUILD_LOG"

      - name: Package Xcode result bundles
        if: always()
        run: |
          set -euo pipefail
          for bundle in "$BUILD_RESULT_BUNDLE" "$UNIT_RESULT_BUNDLE" "$UI_RESULT_BUNDLE"; do
            if [ -d "$bundle" ]; then
              zip -qry "${bundle}.zip" "$bundle"
            fi
          done

      - name: Upload Xcode result bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CameraAccess-xcresults
          path: |
            CameraAccess-Build.xcresult.zip
            CameraAccess-UnitTests.xcresult.zip
            CameraAccess-UITests.xcresult.zip
          if-no-files-found: ignore

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CameraAccess-xcodebuild-log
          path: CameraAccess-xcodebuild.log
          if-no-files-found: ignore
